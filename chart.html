<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>价差提醒图表</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2b;
      --text: #e8edf7;
      --muted: #9fb0cc;
      --green: #2ecc71;
      --red: #ff6b6b;
      --blue: #5da8ff;
      --border: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: linear-gradient(180deg, #0b1020 0%, #0f1728 100%); color: var(--text); }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .hero { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; margin-bottom: 20px; }
    .hero h1 { margin: 0 0 8px; font-size: 30px; }
    .hero p, .meta { margin: 0; color: var(--muted); line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
    .card, .chart-card, .table-card { background: rgba(18,26,43,.92); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
    .card .label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .card .value { font-size: 28px; font-weight: 700; }
    .chart-card, .table-card { margin-bottom: 18px; }
    .section-title { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    .section-title h2 { margin: 0; font-size: 18px; }
    .section-title span { color: var(--muted); font-size: 13px; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
    .tag { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 600; }
    .up { background: rgba(46,204,113,.14); color: #7ef0a8; }
    .down { background: rgba(255,107,107,.14); color: #ff9c9c; }
    .num { font-variant-numeric: tabular-nums; }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .hero { flex-direction: column; align-items: flex-start; } }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } .wrap { padding: 16px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>价差提醒图表</h1>
        <p>统一使用北京时间，兼容旧规则和新规则历史，重点只展示你关心的：时间、价差、方向（变大 / 变小）。</p>
      </div>
      <div class="meta" id="updatedAt">加载中...</div>
    </div>

    <div class="grid" id="summary"></div>

    <div class="chart-card">
      <div class="section-title">
        <h2>按时间的价差记录</h2>
        <span>绿色代表变大，红色代表变小；旧规则和新规则会统一映射后展示</span>
      </div>
      <canvas id="spreadChart" height="110"></canvas>
    </div>

    <div class="chart-card">
      <div class="section-title">
        <h2>按天分线对比</h2>
        <span>横轴统一看一天内的北京时间，不同日期各自一条线</span>
      </div>
      <canvas id="dailyChart" height="110"></canvas>
    </div>

    <div class="table-card">
      <div class="section-title">
        <h2>明细表</h2>
        <span>统一展示时间、方向、价差，兼容旧规则和新规则</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>北京时间</th>
              <th>方向</th>
              <th>价差变化</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const fmtNum = (v) => typeof v === 'number' ? v.toFixed(4) : '-';
    const fmtSignedNum = (v) => typeof v === 'number' ? `${v >= 0 ? '+' : ''}${v.toFixed(4)}` : '-';

    function normalize(item) {
      const event = String(item.event || '');
      const isLegacy1m = event.includes('_1m_');
      const isWindowBreakout = event.endsWith('_spread_window_breakout');
      const status = item.suppressed ? '静默拦截' : item.status_code === 200 ? '已发送' : '未知';

      if (isLegacy1m) {
        const startValue = item.base_spread;
        const endValue = item.current_spread;
        const deltaValue = item.delta_60s;
        return {
          time: item.beijing_time,
          day: item.beijing_time.slice(5, 10),
          clock: item.beijing_time.slice(11, 16),
          direction: item.delta_60s > 0 ? '变大' : '变小',
          directionClass: item.delta_60s > 0 ? 'up' : 'down',
          value: endValue,
          changeText: `${fmtNum(startValue)} → ${fmtNum(endValue)}（${fmtSignedNum(deltaValue)}）`,
          source: item.spread_name || event,
          status,
        };
      }

      if (isWindowBreakout) {
        const spreadName = item.spread_name || (event.startsWith('open_') ? 'open_spread' : 'close_spread');
        const currentValue = typeof item.current_spread === 'number'
          ? item.current_spread
          : spreadName === 'open_spread'
            ? item.snapshot?.open_spread
            : item.snapshot?.close_spread;
        const startValue = typeof item.window_min === 'number' && typeof item.window_max === 'number'
          ? (event.startsWith('open_') ? item.window_min : item.window_max)
          : null;
        const endValue = currentValue;
        const deltaValue = typeof item.window_abs_move === 'number'
          ? (event.startsWith('open_') ? item.window_abs_move : -item.window_abs_move)
          : null;
        const direction = event.startsWith('open_') ? '变大' : '变小';
        return {
          time: item.beijing_time,
          day: item.beijing_time.slice(5, 10),
          clock: item.beijing_time.slice(11, 16),
          direction,
          directionClass: event.startsWith('open_') ? 'up' : 'down',
          value: currentValue,
          changeText: `${fmtNum(startValue)} → ${fmtNum(endValue)}（${fmtSignedNum(deltaValue)}）`,
          source: spreadName,
          status,
        };
      }

      if (event === 'open_cross_up') {
        const endValue = item.snapshot?.open_spread;
        return {
          time: item.beijing_time,
          day: item.beijing_time.slice(5, 10),
          clock: item.beijing_time.slice(11, 16),
          direction: '变大',
          directionClass: 'up',
          value: endValue,
          changeText: fmtNum(endValue),
          source: 'open_spread',
          status,
        };
      }

      if (event === 'close_cross_down') {
        const endValue = item.snapshot?.close_spread;
        return {
          time: item.beijing_time,
          day: item.beijing_time.slice(5, 10),
          clock: item.beijing_time.slice(11, 16),
          direction: '变小',
          directionClass: 'down',
          value: endValue,
          changeText: fmtNum(endValue),
          source: 'close_spread',
          status,
        };
      }

      if (event === 'open_spread_expand_60s') {
        const startValue = item.oldest_open_spread;
        const endValue = typeof item.current_open_spread === 'number' ? item.current_open_spread : item.snapshot?.open_spread;
        const deltaValue = item.delta_60s;
        return {
          time: item.beijing_time,
          day: item.beijing_time.slice(5, 10),
          clock: item.beijing_time.slice(11, 16),
          direction: '变大',
          directionClass: 'up',
          value: endValue,
          changeText: `${fmtNum(startValue)} → ${fmtNum(endValue)}（${fmtSignedNum(deltaValue)}）`,
          source: 'open_spread',
          status,
        };
      }

      if (event === 'open_spread_contract_60s') {
        const startValue = item.oldest_open_spread;
        const endValue = typeof item.current_open_spread === 'number' ? item.current_open_spread : item.snapshot?.open_spread;
        const deltaValue = item.delta_60s;
        return {
          time: item.beijing_time,
          day: item.beijing_time.slice(5, 10),
          clock: item.beijing_time.slice(11, 16),
          direction: '变小',
          directionClass: 'down',
          value: endValue,
          changeText: `${fmtNum(startValue)} → ${fmtNum(endValue)}（${fmtSignedNum(deltaValue)}）`,
          source: 'open_spread',
          status,
        };
      }

      return null;
    }

    async function load() {
      const res = await fetch('/alerts?limit=500');
      const raw = await res.json();
      const items = (raw.items || []).map(normalize).filter(Boolean);

      document.getElementById('updatedAt').textContent = `最近刷新：${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false })}`;
      buildSummary(items);
      buildTable(items);
      buildSpreadChart(items);
      buildDailyChart(items);
    }

    function buildSummary(items) {
      const ups = items.filter(x => x.direction === '变大').length;
      const downs = items.filter(x => x.direction === '变小').length;
      const latest = items.at(-1);
      const maxSpread = items.reduce((m, x) => Math.max(m, x.value ?? -Infinity), -Infinity);
      const maxDelta = items.reduce((m, x) => {
        const text = x.changeText || '';
        const match = text.match(/（([+-]?\d+(?:\.\d+)?)）/);
        const delta = match ? Math.abs(Number(match[1])) : -Infinity;
        return Math.max(m, delta);
      }, -Infinity);
      document.getElementById('summary').innerHTML = [
        ['总提醒数', String(items.length)],
        ['变大提醒数', String(ups)],
        ['变小提醒数', String(downs)],
        ['最大记录价差', Number.isFinite(maxSpread) ? maxSpread.toFixed(4) : '-'],
        ['最大单次变化', Number.isFinite(maxDelta) ? maxDelta.toFixed(4) : '-'],
        ['最近方向', latest?.direction || '-'],
        ['最近时间', latest ? latest.time.slice(11, 19) : '-'],
        ['最近变化', latest?.changeText || '-'],
      ].map(([label, value]) => `
        <div class="card">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
        </div>
      `).join('');
    }

    function buildTable(items) {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = items.map(item => `
        <tr>
          <td class="num">${item.time.replace('T', ' ').slice(0, 19)}</td>
          <td><span class="tag ${item.directionClass}">${item.direction}</span></td>
          <td class="num">${item.changeText || fmtNum(item.value)}</td>
          <td>${item.status}</td>
        </tr>
      `).join('');
    }

    function buildSpreadChart(items) {
      new Chart(document.getElementById('spreadChart'), {
        type: 'line',
        data: {
          labels: items.map(x => x.time.replace('T', ' ').slice(5, 19)),
          datasets: [{
            label: '提醒时价差',
            data: items.map(x => x.value),
            borderColor: '#5da8ff',
            backgroundColor: 'rgba(93,168,255,.15)',
            tension: 0.25,
            pointRadius: 5,
            pointHoverRadius: 7,
            pointBackgroundColor: items.map(x => x.direction === '变大' ? '#2ecc71' : '#ff6b6b'),
            pointBorderColor: items.map(x => x.direction === '变大' ? '#2ecc71' : '#ff6b6b'),
            fill: true,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#e8edf7' } } },
          scales: {
            x: { ticks: { color: '#9fb0cc' }, grid: { color: 'rgba(255,255,255,.06)' } },
            y: { ticks: { color: '#9fb0cc' }, grid: { color: 'rgba(255,255,255,.06)' } }
          }
        }
      });
    }

    function buildDailyChart(items) {
      const timeLabels = [...new Set(items.map(item => item.clock))].sort();
      const days = [...new Set(items.map(item => item.day))].sort();
      const palette = ['#5da8ff', '#2ecc71', '#ff6b6b', '#f7c948', '#b084f5', '#4fd1c5'];
      const datasets = days.map((day, index) => {
        const dayItems = items.filter(item => item.day === day);
        const pointMap = new Map(dayItems.map(item => [item.clock, item.value]));
        return {
          label: day,
          data: timeLabels.map(label => pointMap.has(label) ? pointMap.get(label) : null),
          borderColor: palette[index % palette.length],
          backgroundColor: palette[index % palette.length],
          tension: 0.2,
          pointRadius: 4,
          pointHoverRadius: 6,
          spanGaps: false,
        };
      });
      new Chart(document.getElementById('dailyChart'), {
        type: 'line',
        data: { labels: timeLabels, datasets },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: '#e8edf7' } },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.dataset.label} 价差: ${ctx.raw == null ? '-' : Number(ctx.raw).toFixed(4)}`
              }
            }
          },
          scales: {
            x: {
              title: { display: true, text: '北京时间（一天内时刻）', color: '#9fb0cc' },
              ticks: { color: '#9fb0cc' },
              grid: { color: 'rgba(255,255,255,.06)' }
            },
            y: {
              title: { display: true, text: '提醒时价差', color: '#9fb0cc' },
              ticks: { color: '#9fb0cc' },
              grid: { color: 'rgba(255,255,255,.06)' }
            }
          }
        }
      });
    }

    load().catch(err => {
      document.body.innerHTML = `<pre style="padding:24px;color:#fff;">图表加载失败\n${String(err)}</pre>`;
    });
  </script>
</body>
</html>
